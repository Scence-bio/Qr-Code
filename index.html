<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پۆرتفۆلیۆ - دیزاینی مۆدێرن</title>
    <style>
        /* گۆڕینی ستایلی گشتی */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0a0a12; /* ڕەنگی ڕەشی تۆخ */
            color: white;
            overflow-x: hidden;
        }

        /* باکگراوندە ڕەنگاوڕەنگەکە */
        body::before {
            content: "";
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: rgba(108, 92, 231, 0.4);
            filter: blur(100px);
            z-index: -1;
        }

        /* بەشی ناڤبار */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 10%;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: #ddd;
            font-size: 16px;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: #6c5ce7;
        }

        /* بەشی سەرەکی (Hero Section) */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 50px 10%;
            min-height: 85vh;
        }

        .hero-text {
            max-width: 50%;
        }

        .hero-text h4 {
            color: #6c5ce7;
            font-size: 18px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .hero-text h1 {
            font-size: 60px;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero-text h1 span {
            color: #a29bfe;
        }

        .hero-text p {
            color: #ccc;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* دوگمەکان */
        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-primary {
            background-color: #6c5ce7;
            color: white;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }

        .btn-primary:hover {
            background-color: #5849c4;
            transform: translateY(-3px);
        }

        .btn-outline {
            border: 2px solid #6c5ce7;
            color: white;
        }

        .btn-outline:hover {
            background-color: #6c5ce7;
        }

        /* وێنەی لای ڕاست */
        .hero-img {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-img img {
            width: 100%;
            max-width: 450px;
            z-index: 2;
            filter: drop-shadow(0 0 30px rgba(108, 92, 231, 0.5));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* ڕیسپۆنسیڤ (بۆ مۆبایل) */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding-top: 100px;
            }
            .hero-text {
                max-width: 100%;
                margin-bottom: 50px;
            }
            .btn-group {
                justify-content: center;
            }
            nav ul {
                display: none; /* دەتوانیت لیستەکە بشاریتەوە لە مۆبایل */
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">PORTFOLIO</div>
        <ul>
            <li><a href="#">سەرەتا</a></li>
            <li><a href="#">دەربارە</a></li>
            <li><a href="#">خزمەتگوزاری</a></li>
            <li><a href="#">پەیوەندی</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h4>بەخێرهاتیت</h4>
            <h1>من گەشەپێدەری <span>وێبم</span></h1>
            <p>پسپۆڕم لە دروستکردنی وێب سایتی مۆدێرن و سەرنجڕاکێش بە بەکارهێنانی نوێترین تەکنەلۆژیاکانی جیهان.</p>
            
            <div class="btn-group">
                <a href="#" class="btn btn-primary">بینینی کارەکان</a>
                <a href="#" class="btn btn-outline">پەیوەندی بکە</a>
            </div>
        </div>

        <div class="hero-img">
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/web-developer-working-on-project-5470634-4563439.png" alt="Developer Illustration">
        </div>
    </section>

</body>
</html>
