<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دروستکەری QR کۆد - کارکردی ڕاستەقینە</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
            animation: gradientShift 10s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); }
            50% { background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%); }
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            animation: floatUp 0.8s ease-out;
        }
        
        @keyframes floatUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 40px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .header h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            font-weight: 800;
            position: relative;
            z-index: 2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .header p {
            font-size: 1.3rem;
            opacity: 0.95;
            position: relative;
            z-index: 2;
        }
        
        .content {
            padding: 50px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }
        
        .input-section {
            background: linear-gradient(145deg, #f8faff 0%, #ffffff 100%);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(79, 172, 254, 0.1);
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-container {
            position: relative;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #e8ecf4;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
            font-family: inherit;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.15);
            transform: translateY(-2px);
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .type-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .type-btn {
            padding: 15px 10px;
            border: 2px solid #e8ecf4;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
        }
        
        .type-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(79, 172, 254, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .type-btn:hover::before {
            left: 100%;
        }
        
        .type-btn:hover {
            border-color: #4facfe;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.3);
        }
        
        .type-btn.active {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-color: #4facfe;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.4);
        }
        
        .design-controls {
            background: linear-gradient(145deg, #f1f8ff 0%, #e8f4ff 100%);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(79, 172, 254, 0.1);
        }
        
        .style-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .style-card {
            padding: 20px;
            border: 2px solid #e8ecf4;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .style-card::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.1), transparent);
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
        }
        
        .style-card:hover::after {
            width: 200px;
            height: 200px;
        }
        
        .style-card:hover {
            border-color: #4facfe;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.2);
        }
        
        .style-card.active {
            border-color: #4facfe;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.3);
        }
        
        .style-icon {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }
        
        .color-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .color-group {
            text-align: center;
        }
        
        .color-input {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .color-input:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .generate-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        
        .generate-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s ease;
        }
        
        .generate-btn:hover::before {
            left: 100%;
        }
        
        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }
        
        .generate-btn:active {
            transform: translateY(-1px);
        }
        
        .output-section {
            background: linear-gradient(145deg, #ffffff 0%, #f8faff 100%);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid rgba(79, 172, 254, 0.1);
        }
        
        .qr-container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }
        
        .qr-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #4facfe, #00f2fe, #4facfe);
            border-radius: 22px;
            z-index: -1;
            animation: borderGlow 3s ease-in-out infinite;
        }
        
        @keyframes borderGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        #qrcode {
            display: inline-block;
            border-radius: 15px;
            overflow: hidden;
        }
        
        .download-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .download-btn {
            padding: 15px 25px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.4);
        }
        
        .hidden {
            display: none;
        }
        
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
                padding: 30px;
                gap: 30px;
            }
            
            .header h1 {
                font-size: 2.2rem;
            }
            
            .type-selector {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .style-grid {
                grid-template-columns: 1fr;
            }
            
            .color-controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 دروستکەری QR کۆد</h1>
            <p>QR کۆدی ڕاستەقینە و کارکرد دروست بکە</p>
        </div>
        
        <div class="content">
            <div class="input-section">
                <div class="form-group">
                    <label>🔗 جۆری QR کۆد</label>
                    <div class="type-selector">
                        <button class="type-btn active" data-type="text">📝 تێکست</button>
                        <button class="type-btn" data-type="url">🌐 بەستەر</button>
                        <button class="type-btn" data-type="email">✉️ ئیمەیڵ</button>
                        <button class="type-btn" data-type="phone">📞 تەلەفۆن</button>
                        <button class="type-btn" data-type="wifi">📶 WiFi</button>
                        <button class="type-btn" data-type="sms">💬 SMS</button>
                    </div>
                </div>
                
                <!-- Text Input -->
                <div class="form-group" id="text-input">
                    <label>📝 تێکستەکەت بنووسە</label>
                    <div class="input-container">
                        <textarea id="text-content" placeholder="تێکستەکەت لێرە بنووسە..."></textarea>
                    </div>
                </div>
                
                <!-- URL Input -->
                <div class="form-group hidden" id="url-input">
                    <label>🌐 بەستەری ماڵپەڕ</label>
                    <div class="input-container">
                        <input type="url" id="url-content" placeholder="https://example.com">
                    </div>
                </div>
                
                <!-- Email Input -->
                <div class="form-group hidden" id="email-input">
                    <label>✉️ ناونیشانی ئیمەیڵ</label>
                    <div class="input-container">
                        <input type="email" id="email-content" placeholder="example@email.com">
                    </div>
                    <label>بابەت (ئیختیاری)</label>
                    <div class="input-container">
                        <input type="text" id="email-subject" placeholder="بابەتی ئیمەیڵ">
                    </div>
                </div>
                
                <!-- Phone Input -->
                <div class="form-group hidden" id="phone-input">
                    <label>📞 ژمارەی تەلەفۆن</label>
                    <div class="input-container">
                        <input type="tel" id="phone-content" placeholder="+964xxxxxxxxx">
                    </div>
                </div>
                
                <!-- WiFi Input -->
                <div class="form-group hidden" id="wifi-input">
                    <label>📶 ناوی تۆڕ</label>
                    <div class="input-container">
                        <input type="text" id="wifi-ssid" placeholder="ناوی WiFi">
                    </div>
                    <label>تێپەڕەوشە</label>
                    <div class="input-container">
                        <input type="password" id="wifi-password" placeholder="تێپەڕەوشە">
                    </div>
                </div>
                
                <!-- SMS Input -->
                <div class="form-group hidden" id="sms-input">
                    <label>💬 ژمارەی تەلەفۆن</label>
                    <div class="input-container">
                        <input type="tel" id="sms-number" placeholder="+964xxxxxxxxx">
                    </div>
                    <label>نامەکە</label>
                    <div class="input-container">
                        <textarea id="sms-message" placeholder="نامەکەت لێرە بنووسە..."></textarea>
                    </div>
                </div>
                
                <div class="design-controls">
                    <label>🎨 ستایلی QR کۆد</label>
                    <div class="style-grid">
                        <div class="style-card active" data-style="square">
                            <span class="style-icon">⬛</span>
                            <div>کلاسیک</div>
                        </div>
                        <div class="style-card" data-style="rounded">
                            <span class="style-icon">🔲</span>
                            <div>گۆشە نەرم</div>
                        </div>
                        <div class="style-card" data-style="circle">
                            <span class="style-icon">⚫</span>
                            <div>خڕ</div>
                        </div>
                        <div class="style-card" data-style="dots">
                            <span class="style-icon">⚪</span>
                            <div>خاڵ خاڵ</div>
                        </div>
                    </div>
                    
                    <div class="color-controls">
                        <div class="color-group">
                            <label>ڕەنگی QR</label>
                            <input type="color" id="dark-color" class="color-input" value="#000000">
                        </div>
                        <div class="color-group">
                            <label>ڕەنگی پاش</label>
                            <input type="color" id="light-color" class="color-input" value="#ffffff">
                        </div>
                    </div>
                </div>
                
                <button class="generate-btn" onclick="generateQR()">
                    ⚡ QR کۆد دروست بکە
                </button>
            </div>
            
            <div class="output-section">
                <div class="qr-container">
                    <div id="qrcode">
                        <div style="padding: 80px; color: #ccc; font-size: 1.2rem;">
                            QR کۆدەکەت لێرە دەردەکەوێت
                        </div>
                    </div>
                </div>
                
                <div class="download-section hidden" id="download-section">
                    <button class="download-btn" onclick="downloadQR('png')">
                        📥 PNG داگرتن
                    </button>
                    <button class="download-btn" onclick="downloadQR('svg')">
                        📥 SVG داگرتن
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentQR = null;
        let currentStyle = 'square';
        
        // Type selector functionality
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                document.querySelectorAll('[id$="-input"]').forEach(group => {
                    group.classList.add('hidden');
                });
                
                const type = this.dataset.type;
                document.getElementById(type + '-input').classList.remove('hidden');
            });
        });
        
        // Style selector functionality
        document.querySelectorAll('.style-card').forEach(card => {
            card.addEventListener('click', function() {
                document.querySelectorAll('.style-card').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                currentStyle = this.dataset.style;
                
                // Re-generate if QR exists
                if (currentQR) {
                    generateQR();
                }
            });
        });
        
        // Color change listeners
        document.getElementById('dark-color').addEventListener('change', function() {
            if (currentQR) generateQR();
        });
        
        document.getElementById('light-color').addEventListener('change', function() {
            if (currentQR) generateQR();
        });
        
        function generateQR() {
            const activeType = document.querySelector('.type-btn.active').dataset.type;
            let content = '';
            
            switch(activeType) {
                case 'text':
                    content = document.getElementById('text-content').value.trim();
                    break;
                case 'url':
                    content = document.getElementById('url-content').value.trim();
                    break;
                case 'email':
                    const email = document.getElementById('email-content').value.trim();
                    const subject = document.getElementById('email-subject').value.trim();
                    if (subject) {
                        content = `mailto:${email}?subject=${encodeURIComponent(subject)}`;
                    } else {
                        content = `mailto:${email}`;
                    }
                    break;
                case 'phone':
                    content = `tel:${document.getElementById('phone-content').value.trim()}`;
                    break;
                case 'wifi':
                    const ssid = document.getElementById('wifi-ssid').value.trim();
                    const password = document.getElementById('wifi-password').value.trim();
                    content = `WIFI:T:WPA;S:${ssid};P:${password};;`;
                    break;
                case 'sms':
                    const smsNumber = document.getElementById('sms-number').value.trim();
                    const smsMessage = document.getElementById('sms-message').value.trim();
                    content = `sms:${smsNumber}?body=${encodeURIComponent(smsMessage)}`;
                    break;
            }
            
            if (!content) {
                alert('تکایە زانیاریەکان پڕ بکەرەوە!');
                return;
            }
            
            // Get colors
            const darkColor = document.getElementById('dark-color').value;
            const lightColor = document.getElementById('light-color').value;
            
            // Clear previous QR code
            document.getElementById('qrcode').innerHTML = '';
            
            // QR Code options
            let options = {
                width: 280,
                height: 280,
                colorDark: darkColor,
                colorLight: lightColor,
                correctLevel: QRCode.CorrectLevel.H,
                margin: 2
            };
            
            // Generate QR code with proper error handling
            QRCode.toCanvas(document.getElementById('qrcode'), content, options, function (error) {
                if (error) {
                    console.error('QR Generation Error:', error);
                    alert('هەڵەیەک ڕوویدا لە دروستکردنی QR کۆد: ' + error.message);
                } else {
                    console.log('QR Code generated successfully');
                    currentQR = content;
                    document.getElementById('download-section').classList.remove('hidden');
                    
                    // Apply style effects
                    applyStyleEffects();
                }
            });
        }
        
        function applyStyleEffects() {
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            
            switch(currentStyle) {
                case 'rounded':
                    canvas.style.borderRadius = '15px';
                    break;
                case 'circle':
                    canvas.style.borderRadius = '50%';
                    break;
                case 'dots':
                    canvas.style.filter = 'contrast(1.1) brightness(0.95)';
                    break;
                default:
                    canvas.style.borderRadius = '8px';
                    canvas.style.filter = 'none';
                    break;
            }
        }
        
        function downloadQR(format) {
            if (!currentQR) {
                alert('سەرەتا QR کۆدەکە دروست بکە!');
                return;
            }
            
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) {
                alert('هیچ QR کۆدێک نەدۆزرایەوە!');
                return;
            }
            
            if (format === 'png') {
                try {
                    const link = document.createElement('a');
                    link.download = `qr-code-${Date.now()}.png`;
                    link.href = canvas.toDataURL('image/png', 1.0);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (error) {
                    console.error('Download error:', error);
                    alert('هەڵەیەک لە داگرتن!');
                }
            } else if (format === 'svg') {
                // Generate SVG version
                const darkColor = document.getElementById('dark-color').value;
                const lightColor = document.getElementById('light-color').value;
                
                QRCode.toString(currentQR, {
                    type: 'svg',
                    width: 280,
                    height: 280,
                    color: {
                        dark: darkColor,
                        light: lightColor
                    },
                    margin: 2
                }, function (err, svg) {
                    if (err) {
                        console.error('SVG generation error:', err);
                        alert('هەڵەیەک لە دروستکردنی SVG!');
                        return;
                    }
                    
                    try {
                        const blob = new Blob([svg], {type: 'image/svg+xml'});
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.download = `qr-code-${Date.now()}.svg`;
                        link.href = url;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(url);
                    } catch (error) {
                        console.error('SVG download error:', error);
                        alert('هەڵەیەک لە داگرتنی SVG!');
                    }
                });
            }
        }
        
        // Auto-generate on Enter key (for inputs)
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) {
                if (!e.shiftKey) {
                    e.preventDefault();
                    generateQR();
                }
            }
        });
        
        // Add some demo content
        document.getElementById('text-content').value = 'سڵاو! ئەمە QR کۆدێکی تاقیکردنەوەیە بۆ ئازمایشت کردن.';
    </script>
</body>
</html>
