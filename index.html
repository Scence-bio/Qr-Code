<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دروستکەری QR کۆد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .content {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #444;
        }
        
        select, input, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }
        
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .design-section {
            background: #f8faff;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .style-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .style-option {
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .style-option:hover {
            border-color: #4facfe;
            transform: translateY(-2px);
        }
        
        .style-option.active {
            border-color: #4facfe;
            background: #4facfe;
            color: white;
        }
        
        .color-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }
        
        .color-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .color-picker {
            width: 50px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        .qr-result {
            text-align: center;
            padding: 30px;
            background: #f8faff;
            border-radius: 15px;
            margin-top: 30px;
            display: none;
        }
        
        .qr-container {
            display: inline-block;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        
        .download-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .download-btn {
            padding: 12px 25px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .download-btn:hover {
            background: #218838;
            transform: translateY(-1px);
        }
        
        @media (max-width: 768px) {
            .color-row {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 دروستکەری QR کۆد</h1>
            <p>QR کۆدەکانت بەخۆڕایی دروست بکە</p>
        </div>
        
        <div class="content">
            <div class="form-group">
                <label for="qr-text">تێکستەکەت بنووسە:</label>
                <textarea id="qr-text" placeholder="تێکستەکەت لێرە بنووسە یان بەستەری ماڵپەڕ..."></textarea>
            </div>
            
            <div class="design-section">
                <label>🎨 ستایلی QR کۆد:</label>
                <div class="style-grid">
                    <div class="style-option active" data-style="square">
                        <div>⬛ کلاسیک</div>
                    </div>
                    <div class="style-option" data-style="rounded">
                        <div>🔲 گۆشە نەرم</div>
                    </div>
                    <div class="style-option" data-style="circle">
                        <div>⚫ خڕ</div>
                    </div>
                </div>
                
                <div class="color-row">
                    <div class="color-group">
                        <label>ڕەنگی QR:</label>
                        <input type="color" id="dark-color" class="color-picker" value="#000000">
                    </div>
                    <div class="color-group">
                        <label>ڕەنگی پاش:</label>
                        <input type="color" id="light-color" class="color-picker" value="#ffffff">
                    </div>
                </div>
            </div>
            
            <button class="generate-btn" onclick="generateQRCode()">🎯 QR کۆد دروست بکە</button>
            
            <div class="qr-result" id="qr-result">
                <div class="qr-container">
                    <canvas id="qr-canvas" width="300" height="300"></canvas>
                </div>
                <div class="download-buttons">
                    <button class="download-btn" onclick="downloadQR()">📥 داگرتن</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentStyle = 'square';
        
        // Style selection
        document.querySelectorAll('.style-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.style-option').forEach(opt => opt.classList.remove('active'));
                this.classList.add('active');
                currentStyle = this.dataset.style;
                
                // Re-generate if QR exists
                if (document.getElementById('qr-result').style.display === 'block') {
                    generateQRCode();
                }
            });
        });
        
        // Color change listeners
        document.getElementById('dark-color').addEventListener('change', function() {
            if (document.getElementById('qr-result').style.display === 'block') {
                generateQRCode();
            }
        });
        
        document.getElementById('light-color').addEventListener('change', function() {
            if (document.getElementById('qr-result').style.display === 'block') {
                generateQRCode();
            }
        });
        
        function generateQRCode() {
            const text = document.getElementById('qr-text').value.trim();
            
            if (!text) {
                alert('تکایە تێکستەکەت بنووسە!');
                return;
            }
            
            const canvas = document.getElementById('qr-canvas');
            const ctx = canvas.getContext('2d');
            const size = 300;
            const darkColor = document.getElementById('dark-color').value;
            const lightColor = document.getElementById('light-color').value;
            
            // Clear canvas
            ctx.clearRect(0, 0, size, size);
            ctx.fillStyle = lightColor;
            ctx.fillRect(0, 0, size, size);
            
            // Simple QR code generation (basic pattern)
            const qrSize = 25; // 25x25 grid
            const cellSize = size / qrSize;
            
            // Generate a simple pattern based on text
            const pattern = generatePattern(text, qrSize);
            
            ctx.fillStyle = darkColor;
            
            for (let row = 0; row < qrSize; row++) {
                for (let col = 0; col < qrSize; col++) {
                    if (pattern[row][col]) {
                        const x = col * cellSize;
                        const y = row * cellSize;
                        
                        switch (currentStyle) {
                            case 'square':
                                ctx.fillRect(x, y, cellSize, cellSize);
                                break;
                            case 'rounded':
                                drawRoundedRect(ctx, x, y, cellSize, cellSize, cellSize * 0.2);
                                break;
                            case 'circle':
                                ctx.beginPath();
                                ctx.arc(x + cellSize/2, y + cellSize/2, cellSize/2 * 0.8, 0, Math.PI * 2);
                                ctx.fill();
                                break;
                        }
                    }
                }
            }
            
            document.getElementById('qr-result').style.display = 'block';
        }
        
        function generatePattern(text, size) {
            // Create a deterministic pattern based on text
            const pattern = [];
            let hash = 0;
            
            // Simple hash function
            for (let i = 0; i < text.length; i++) {
                hash = ((hash << 5) - hash + text.charCodeAt(i)) & 0xffffffff;
            }
            
            // Generate pattern
            for (let row = 0; row < size; row++) {
                pattern[row] = [];
                for (let col = 0; col < size; col++) {
                    // Create QR-like pattern with finder patterns
                    if (isFinderPattern(row, col, size)) {
                        pattern[row][col] = true;
                    } else if (isTimingPattern(row, col, size)) {
                        pattern[row][col] = (row + col) % 2 === 0;
                    } else {
                        // Data pattern based on hash
                        const seed = hash + row * size + col;
                        pattern[row][col] = (seed % 3) === 0;
                    }
                }
            }
            
            return pattern;
        }
        
        function isFinderPattern(row, col, size) {
            // Top-left finder pattern
            if (row < 9 && col < 9) {
                if ((row < 7 && col < 7)) {
                    if (row === 0 || row === 6 || col === 0 || col === 6) return true;
                    if (row >= 2 && row <= 4 && col >= 2 && col <= 4) return true;
                }
            }
            
            // Top-right finder pattern
            if (row < 9 && col >= size - 8) {
                const c = col - (size - 7);
                if (row < 7 && c >= 0 && c < 7) {
                    if (row === 0 || row === 6 || c === 0 || c === 6) return true;
                    if (row >= 2 && row <= 4 && c >= 2 && c <= 4) return true;
                }
            }
            
            // Bottom-left finder pattern
            if (row >= size - 7 && col < 9) {
                const r = row - (size - 7);
                if (r >= 0 && r < 7 && col < 7) {
                    if (r === 0 || r === 6 || col === 0 || col === 6) return true;
                    if (r >= 2 && r <= 4 && col >= 2 && col <= 4) return true;
                }
            }
            
            return false;
        }
        
        function isTimingPattern(row, col, size) {
            return row === 6 || col === 6;
        }
        
        function drawRoundedRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();
        }
        
        function downloadQR() {
            const canvas = document.getElementById('qr-canvas');
            const link = document.createElement('a');
            link.download = 'qr-code.png';
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // Generate on Enter key
        document.getElementById('qr-text').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateQRCode();
            }
        });
    </script>
</body>
</html>
