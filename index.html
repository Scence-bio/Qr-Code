<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دروستکەری QR کۆد - لەگەڵ لۆگۆ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 800;
        }
        
        .content {
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            .content {
                grid-template-columns: 1fr;
                padding: 20px;
                gap: 20px;
            }
        }
        
        .input-section, .output-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #2c3e50;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e8ecf4;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #4facfe;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .logo-section {
            background: #fff;
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .upload-zone {
            cursor: pointer;
            padding: 20px;
        }
        
        .preset-icons {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        
        .icon-btn {
            width: 50px;
            height: 50px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .icon-btn:hover, .icon-btn.active {
            border-color: #4facfe;
            background: #f0f8ff;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        
        @media (max-width: 480px) {
            .controls {
                grid-template-columns: 1fr;
            }
            .preset-icons {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        .slider-group {
            text-align: center;
        }
        
        .slider {
            width: 100%;
            margin: 10px 0;
        }
        
        .color-input {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            margin: 0 auto;
            display: block;
        }
        
        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
        }
        
        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
        }
        
        .qr-canvas {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        
        .download-section {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        
        .download-btn {
            flex: 1;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .download-btn:hover {
            background: #218838;
        }
        
        .placeholder {
            color: #999;
            font-size: 16px;
        }
        
        .error {
            color: #dc3545;
        }
        
        .success {
            color: #28a745;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4facfe;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #logo-file {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>دروستکەری QR کۆد</h1>
            <p>QR کۆدی ڕاستەقینە دروست بکە لەگەڵ لۆگۆ</p>
        </div>
        
        <div class="content">
            <div class="input-section">
                <div class="form-group">
                    <label>تێکستەکەت یان بەستەرەکەت بنووسە</label>
                    <textarea id="qr-text" placeholder="تێکستەکەت یان https://example.com بنووسە...">سڵاو! ئەمە تاقیکردنەوەی QR کۆدە.</textarea>
                </div>
                
                <div class="logo-section">
                    <label>لۆگۆ/ئایکۆن زیاد بکە</label>
                    <div class="upload-zone" onclick="document.getElementById('logo-file').click()">
                        <div id="upload-text">کلیک بکە بۆ هەڵبژاردنی وێنە</div>
                        <img id="logo-preview" style="display: none; max-width: 80px; max-height: 80px; margin: 10px 0;" alt="Logo">
                    </div>
                    <input type="file" id="logo-file" accept="image/*">
                    
                    <div>
                        <strong>یان ئایکۆنێک هەڵبژێرە:</strong>
                    </div>
                    
                    <div class="preset-icons">
                        <div class="icon-btn" onclick="selectIcon('❤️')">❤️</div>
                        <div class="icon-btn" onclick="selectIcon('⭐')">⭐</div>
                        <div class="icon-btn" onclick="selectIcon('🏠')">🏠</div>
                        <div class="icon-btn" onclick="selectIcon('📱')">📱</div>
                        <div class="icon-btn" onclick="selectIcon('💼')">💼</div>
                        <div class="icon-btn" onclick="selectIcon('🎯')">🎯</div>
                    </div>
                    
                    <button onclick="clearLogo()" style="padding: 5px 15px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer;">
                        سڕینەوە
                    </button>
                </div>
                
                <div class="controls">
                    <div class="slider-group">
                        <label>قەبارەی QR</label>
                        <input type="range" id="size-slider" class="slider" min="200" max="400" value="300">
                        <div id="size-display">300px</div>
                    </div>
                    
                    <div>
                        <label>جۆری چوارچێوە</label>
                        <select id="frame-type">
                            <option value="none">بەبێ چوارچێوە</option>
                            <option value="simple" selected>سادە</option>
                            <option value="border">بە سنوور</option>
                        </select>
                    </div>
                </div>
                
                <div class="controls">
                    <div>
                        <label>ڕەنگی QR</label>
                        <input type="color" id="dark-color" class="color-input" value="#000000">
                    </div>
                    <div>
                        <label>ڕەنگی پاشبنەما</label>
                        <input type="color" id="light-color" class="color-input" value="#ffffff">
                    </div>
                </div>
                
                <div class="controls">
                    <div class="slider-group">
                        <label>قەبارەی لۆگۆ</label>
                        <input type="range" id="logo-size-slider" class="slider" min="10" max="25" value="15">
                        <div id="logo-size-display">15%</div>
                    </div>
                    
                    <div>
                        <label>شێوازی لۆگۆ</label>
                        <select id="logo-style">
                            <option value="square">چوارگۆشە</option>
                            <option value="circle">خولاوی</option>
                        </select>
                    </div>
                </div>
                
                <button class="generate-btn" onclick="generateQR()">
                    QR کۆد دروست بکە
                </button>
            </div>
            
            <div class="output-section">
                <div class="qr-container">
                    <div id="qr-display" class="placeholder">
                        QR کۆدەکەت لێرە دەردەکەوێت
                    </div>
                </div>
                
                <div id="download-section" class="download-section" style="display: none;">
                    <button class="download-btn" onclick="downloadQR('png')">
                        PNG داگرە
                    </button>
                    <button class="download-btn" onclick="downloadQR('jpg')">
                        JPG داگرە
                    </button>
                </div>
                
                <div style="background: #d4edda; padding: 15px; border-radius: 8px; text-align: center; color: #155724; margin-top: 15px;">
                    <strong>QR کۆدی بە لۆگۆ</strong><br>
                    لە هەموو ئامێرەکانی سکانەر کار دەکات
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>
    <script>
        // Global variables
        let currentQRCanvas = null;
        let currentLogoImage = null;
        let selectedIcon = null;
        
        // Update displays
        document.getElementById('size-slider').oninput = function() {
            document.getElementById('size-display').textContent = this.value + 'px';
        };
        
        document.getElementById('logo-size-slider').oninput = function() {
            document.getElementById('logo-size-display').textContent = this.value + '%';
        };
        
        // File upload
        document.getElementById('logo-file').onchange = function(e) {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        currentLogoImage = img;
                        selectedIcon = null;
                        updateLogoPreview();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        };
        
        function selectIcon(icon) {
            document.querySelectorAll('.icon-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            selectedIcon = icon;
            currentLogoImage = null;
            updateLogoPreview();
        }
        
        function clearLogo() {
            currentLogoImage = null;
            selectedIcon = null;
            document.querySelectorAll('.icon-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('logo-file').value = '';
            updateLogoPreview();
        }
        
        function updateLogoPreview() {
            const uploadText = document.getElementById('upload-text');
            const logoPreview = document.getElementById('logo-preview');
            
            if (currentLogoImage) {
                uploadText.style.display = 'none';
                logoPreview.style.display = 'block';
                logoPreview.src = currentLogoImage.src;
            } else if (selectedIcon) {
                uploadText.innerHTML = `<div style="font-size: 2rem;">${selectedIcon}</div>ئایکۆنی هەڵبژێردراو`;
                logoPreview.style.display = 'none';
            } else {
                uploadText.innerHTML = 'کلیک بکە بۆ هەڵبژاردنی وێنە';
                logoPreview.style.display = 'none';
            }
        }
        
        function showMessage(message, type = 'placeholder') {
            let className = 'placeholder';
            if (type === 'error') className += ' error';
            if (type === 'success') className += ' success';
            
            document.getElementById('qr-display').innerHTML = `
                <div class="${className}">
                    <strong>${message}</strong>
                </div>
            `;
        }
        
        function generateQR() {
            const text = document.getElementById('qr-text').value.trim();
            
            if (!text) {
                showMessage('تکایە تێکستەکەت بنووسە!', 'error');
                return;
            }
            
            // Show loading
            document.getElementById('qr-display').innerHTML = `
                <div class="placeholder success">
                    <div class="spinner"></div>
                    <strong>چاوەڕێ بکە...</strong>
                </div>
            `;
            
            const generateBtn = document.querySelector('.generate-btn');
            generateBtn.disabled = true;
            generateBtn.textContent = 'دروستکردن...';
            
            // Use setTimeout to allow UI to update
            setTimeout(function() {
                try {
                    const size = parseInt(document.getElementById('size-slider').value);
                    const darkColor = document.getElementById('dark-color').value;
                    const lightColor = document.getElementById('light-color').value;
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    
                    const qrOptions = {
                        width: size,
                        height: size,
                        color: {
                            dark: darkColor,
                            light: lightColor
                        },
                        margin: 2
                    };
                    
                    QRCode.toCanvas(canvas, text, qrOptions, function(error) {
                        if (error) {
                            console.error('QR Error:', error);
                            showMessage('خەتا لە دروستکردنی QR کۆد', 'error');
                            resetButton();
                            return;
                        }
                        
                        // Add logo if available
                        if (currentLogoImage || selectedIcon) {
                            try {
                                addLogoToCanvas(canvas);
                            } catch (logoError) {
                                console.error('Logo Error:', logoError);
                                // Continue without logo
                            }
                        }
                        
                        currentQRCanvas = canvas;
                        displayQRCode(canvas);
                        resetButton();
                    });
                    
                } catch (error) {
                    console.error('Generation Error:', error);
                    showMessage('خەتا لە دروستکردنی QR کۆد', 'error');
                    resetButton();
                }
            }, 100);
        }
        
        function addLogoToCanvas(canvas) {
            const ctx = canvas.getContext('2d');
            const logoSize = parseInt(document.getElementById('logo-size-slider').value);
            const logoStyle = document.getElementById('logo-style').value;
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const logoPixelSize = (canvas.width * logoSize) / 100;
            
            // White background for logo
            const bgSize = logoPixelSize * 1.2;
            ctx.fillStyle = '#ffffff';
            
            if (logoStyle === 'circle') {
                ctx.beginPath();
                ctx.arc(centerX, centerY, bgSize / 2, 0, 2 * Math.PI);
                ctx.fill();
            } else {
                ctx.fillRect(centerX - bgSize/2, centerY - bgSize/2, bgSize, bgSize);
            }
            
            if (currentLogoImage) {
                ctx.save();
                
                if (logoStyle === 'circle') {
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, logoPixelSize / 2, 0, 2 * Math.PI);
                    ctx.clip();
                }
                
                ctx.drawImage(
                    currentLogoImage,
                    centerX - logoPixelSize/2,
                    centerY - logoPixelSize/2,
                    logoPixelSize,
                    logoPixelSize
                );
                
                ctx.restore();
                
            } else if (selectedIcon) {
                const fontSize = logoPixelSize * 0.7;
                ctx.font = `${fontSize}px Arial, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#333333';
                ctx.fillText(selectedIcon, centerX, centerY);
            }
        }
        
        function displayQRCode(canvas) {
            const frameType = document.getElementById('frame-type').value;
            
            canvas.className = 'qr-canvas';
            
            if (frameType === 'border') {
                canvas.style.border = '5px solid #333';
                canvas.style.borderRadius = '8px';
            } else if (frameType === 'simple') {
                canvas.style.border = '2px solid #ddd';
                canvas.style.borderRadius = '8px';
            }
            
            document.getElementById('qr-display').innerHTML = '';
            document.getElementById('qr-display').appendChild(canvas);
            document.getElementById('download-section').style.display = 'flex';
        }
        
        function resetButton() {
            const generateBtn = document.querySelector('.generate-btn');
            generateBtn.disabled = false;
            generateBtn.textContent = 'QR کۆد دروست بکە';
        }
        
        function downloadQR(format) {
            if (!currentQRCanvas) {
                alert('QR کۆد نەدۆزرایەوە!');
                return;
            }
            
            try {
                const fileName = `qr-code-${Date.now()}.${format}`;
                const link = document.createElement('a');
                link.download = fileName;
                
                if (format === 'jpg') {
                    const jpgCanvas = document.createElement('canvas');
                    jpgCanvas.width = currentQRCanvas.width;
                    jpgCanvas.height = currentQRCanvas.height;
                    const jpgCtx = jpgCanvas.getContext('2d');
                    
                    jpgCtx.fillStyle = '#ffffff';
                    jpgCtx.fillRect(0, 0, jpgCanvas.width, jpgCanvas.height);
                    jpgCtx.drawImage(currentQRCanvas, 0, 0);
                    
                    link.href = jpgCanvas.toDataURL('image/jpeg', 0.9);
                } else {
                    link.href = currentQRCanvas.toDataURL('image/png');
                }
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
            } catch (error) {
                console.error('Download error:', error);
                alert('خەتا لە دابەزاندنی فایلەکە!');
            }
        }
        
        // Auto-generate on load
        window.onload = function() {
            if (typeof QRCode !== 'undefined') {
                setTimeout(generateQR, 500);
            } else {
                showMessage('کتێبخانەی QR کۆد بارنەبووە', 'error');
            }
        };
    </script>
</body>
</html>
