<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="دروستکردنی QR کۆد بە چوارچێوەی جوان - ئێستا بەئاسانی QR کۆد دروست بکە!">
    <title>دروستکردنی QR کۆد</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Kufi Arabic', 'NotoKufiArabic', sans-serif;
        }
        
        body {
            direction: rtl;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientShift 10s ease infinite;
            min-height: 100vh;
            padding: 2rem 1rem;
            font-family: 'Noto Kufi Arabic', sans-serif;
        }

        @keyframes gradientShift {
            0%, 100% { background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); }
            50% { background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%); }
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            animation: floatUp 0.8s ease-out;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #2563eb, #9333ea, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 1.25rem;
            color: #4b5563;
            font-weight: 500;
        }

        .main-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-header {
            background: linear-gradient(to right, #3b82f6, #06b6d4);
            padding: 2rem;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .card-header h2 {
            font-size: 1.875rem;
            font-weight: 700;
            position: relative;
            z-index: 10;
        }

        .card-content {
            padding: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2.5rem;
            }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 1.125rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }

        textarea, input[type="range"], select, input[type="color"] {
            font-family: 'Noto Kufi Arabic', sans-serif;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            resize: vertical;
            min-height: 7rem;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .size-control {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .size-display {
            font-size: 0.875rem;
            font-weight: 700;
            color: white;
            background: #2563eb;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
        }

        input[type="range"] {
            width: 100%;
            height: 0.5rem;
            border-radius: 0.25rem;
            background: #d1d5db;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }

        input[type="range"]::-moz-range-thumb {
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }

        select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .color-group {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        input[type="color"] {
            width: 5rem;
            height: 5rem;
            border: 2px solid #d1d5db;
            border-radius: 0.5rem;
            cursor: pointer;
        }

        .color-value {
            font-size: 0.875rem;
            font-family: 'Courier New', monospace;
            color: #4b5563;
            word-break: break-all;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 2rem;
        }

        button {
            flex: 1;
            padding: 1rem;
            font-size: 1.125rem;
            font-weight: 700;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Kufi Arabic', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(to right, #2563eb, #9333ea);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: #1f2937;
            border: 2px solid #d1d5db;
        }

        .btn-secondary:hover {
            background: #f3f4f6;
        }

        .qr-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 20rem;
            background: linear-gradient(to bottom right, #f9fafb, #f3f4f6);
            border-radius: 0.5rem;
            border: 2px dashed #d1d5db;
            margin-bottom: 1.5rem;
            padding: 1rem;
        }

        .qr-placeholder {
            text-align: center;
            color: #9ca3af;
            font-weight: 600;
        }

        .qr-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .spinner {
            width: 3rem;
            height: 3rem;
            border: 4px solid rgba(79, 172, 254, 0.1);
            border-top: 4px solid #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .qr-image-wrapper {
            animation: floatUp 0.5s ease-out;
        }

        .qr-image-wrapper img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* Frame Styles */
        .frame-modern {
            padding: 1rem;
            background: linear-gradient(145deg, #ffffff, #f8f9fa);
            border-radius: 1.25rem;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1), inset 0 2px 8px rgba(255, 255, 255, 0.8);
        }

        .frame-elegant {
            padding: 1.25rem;
            background: linear-gradient(145deg, #f8f9fa, #ffffff);
            border-radius: 0.75rem;
            border: 3px solid #4facfe;
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.3);
        }

        .frame-classic {
            padding: 1rem;
            background: #ffffff;
            border: 6px solid #333;
            border-radius: 0.25rem;
            box-shadow: 0 0 0 3px #fff, 0 0 0 6px #333;
        }

        .frame-rounded {
            padding: 1.25rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 2.5rem;
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
        }

        .frame-shadow {
            padding: 0.75rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(0, 0, 0, 0.05);
        }

        .frame-tech {
            padding: 1rem;
            background: linear-gradient(145deg, #2c3e50, #34495e);
            border-radius: 0.75rem;
            border: 2px solid #4facfe;
            position: relative;
            overflow: hidden;
        }

        .frame-neon {
            padding: 1.125rem;
            background: #000;
            border-radius: 0.75rem;
            border: 2px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .frame-gradient {
            padding: 1rem;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%);
            border-radius: 0.9375rem;
            box-shadow: 0 8px 25px rgba(240, 147, 251, 0.3);
        }

        .frame-gold {
            padding: 1rem;
            background: linear-gradient(145deg, #ffd700, #ffed4e);
            border-radius: 0.75rem;
            border: 3px solid #daa520;
            box-shadow: 0 8px 25px rgba(218, 165, 32, 0.3);
        }

        .download-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 480px) {
            .download-buttons {
                grid-template-columns: 1fr;
            }
        }

        .btn-download {
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            font-family: 'Noto Kufi Arabic', sans-serif;
        }

        .btn-download-png {
            background: #2563eb;
        }

        .btn-download-png:hover {
            background: #1d4ed8;
        }

        .btn-download-svg {
            background: #9333ea;
        }

        .btn-download-svg:hover {
            background: #7e22ce;
        }

        .btn-download-copy {
            background: #ec4899;
        }

        .btn-download-copy:hover {
            background: #db2777;
        }

        .footer {
            padding-top: 1rem;
            border-top: 1px solid #e5e7eb;
            text-align: center;
            font-size: 0.875rem;
            color: #4b5563;
        }

        .footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 700;
        }

        .footer a:hover {
            color: #1d4ed8;
        }

        .error-message {
            color: #dc2626;
            font-weight: 700;
        }

        .success-message {
            color: #16a34a;
            font-weight: 700;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            animation: floatUp 0.3s ease-out;
            max-width: 300px;
        }

        .toast.success {
            border-left: 4px solid #16a34a;
        }

        .toast.error {
            border-left: 4px solid #dc2626;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎯 دروستکردنی QR کۆد</h1>
            <p>ئێستا بەئاسانی QR کۆد دروست بکە!</p>
        </div>

        <!-- Main Card -->
        <div class="main-card">
            <!-- Card Header -->
            <div class="card-header">
                <h2>🚀 دروستکردنی QR کۆد</h2>
            </div>

            <!-- Card Content -->
            <div class="card-content">
                <div class="grid">
                    <!-- Input Section -->
                    <div>
                        <!-- Text Input -->
                        <div class="form-group">
                            <label>📝 تێکستەکەت یان بەستەرەکەت بنووسە</label>
                            <textarea
                                id="qr-text"
                                placeholder="تێکستەکەت یان https://example.com بنووسە..."
                            ></textarea>
                        </div>

                        <!-- Size Slider -->
                        <div class="form-group">
                            <div class="size-control">
                                <label>📏 قەبارەی QR کۆد</label>
                                <span class="size-display" id="size-display">220px</span>
                            </div>
                            <input
                                type="range"
                                id="size-slider"
                                min="150"
                                max="350"
                                value="220"
                            >
                        </div>

                        <!-- Frame Type -->
                        <div class="form-group">
                            <label>🎨 جۆری چوارچێوە</label>
                            <select id="frame-type">
                                <option value="none">بەبێ چوارچێوە</option>
                                <option value="modern" selected>مۆدێرن</option>
                                <option value="elegant">جوان</option>
                                <option value="classic">کلاسیک</option>
                                <option value="rounded">خولاوی</option>
                                <option value="shadow">سێبەر</option>
                                <option value="tech">تەکنەلۆجی</option>
                                <option value="neon">نیۆن</option>
                                <option value="gradient">ڕەنگاوڕەنگ</option>
                                <option value="gold">زێڕین</option>
                            </select>
                        </div>

                        <!-- Colors -->
                        <div class="form-group">
                            <label>ڕەنگی QR</label>
                            <div class="color-group">
                                <input
                                    type="color"
                                    id="dark-color"
                                    value="#000000"
                                >
                                <span class="color-value" id="dark-color-text">#000000</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>ڕەنگی باگڕاوند</label>
                            <div class="color-group">
                                <input
                                    type="color"
                                    id="light-color"
                                    value="#ffffff"
                                >
                                <span class="color-value" id="light-color-text">#ffffff</span>
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="button-group">
                            <button class="btn-primary" id="generate-btn" onclick="generateQR()">
                                ⚡ QR کۆد دروست بکە
                            </button>
                            <button class="btn-secondary" onclick="resetForm()">
                                🔄 ڕێست بکە
                            </button>
                        </div>
                    </div>

                    <!-- Output Section -->
                    <div>
                        <!-- QR Display -->
                        <div id="qr-container" class="qr-container">
                            <div class="qr-placeholder">
                                QR کۆدەکەت لێرە دەردەکەوێت
                            </div>
                        </div>

                        <!-- Download Buttons -->
                        <div id="download-section" class="download-buttons hidden">
                            <button class="btn-download btn-download-png" onclick="downloadQR('png')">
                                📥 PNG
                            </button>
                            <button class="btn-download btn-download-svg" onclick="downloadQR('svg')">
                                📄 SVG
                            </button>
                            <button class="btn-download btn-download-copy" onclick="copyToClipboard()">
                                📋 کۆپی
                            </button>
                        </div>

                        <!-- Footer -->
                        <div class="footer">
                            <p>
                                🔥 <strong>دروست کراوە لەلایەن</strong>
                                <a href="https://www.facebook.com/share/1ZoYU1DAhS/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer">
                                    MAHMOOD FAQE
                                </a>
                            </p>
                            <p style="margin-top: 0.5rem;">لە هەموو ئامێرەکان کار دەکات - باشترین و بەخۆڕایی!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentQRUrl = '';

        // Update size display
        document.getElementById('size-slider').addEventListener('input', function() {
            document.getElementById('size-display').textContent = this.value + 'px';
            if (currentQRUrl) {
                generateQR();
            }
        });

        // Update color display
        document.getElementById('dark-color').addEventListener('input', function() {
            document.getElementById('dark-color-text').textContent = this.value;
            if (currentQRUrl) {
                generateQR();
            }
        });

        document.getElementById('light-color').addEventListener('input', function() {
            document.getElementById('light-color-text').textContent = this.value;
            if (currentQRUrl) {
                generateQR();
            }
        });

        // Auto-regenerate on frame type change
        document.getElementById('frame-type').addEventListener('change', function() {
            if (currentQRUrl) {
                generateQR();
            }
        });

        function generateQR() {
            const text = document.getElementById('qr-text').value.trim();

            if (!text) {
                showToast('تکایە تێکستەکەت بنووسە!', 'error');
                return;
            }

            const container = document.getElementById('qr-container');
            container.innerHTML = `
                <div class="qr-loading">
                    <div class="spinner"></div>
                    <strong>چاوەڕێ بکە...</strong>
                    <span style="font-size: 0.875rem; color: #6b7280;">QR کۆد دروست دەکرێت</span>
                </div>
            `;

            const generateBtn = document.getElementById('generate-btn');
            generateBtn.disabled = true;
            generateBtn.textContent = '🔄 دروستکردن...';

            const size = Math.min(document.getElementById('size-slider').value, 300);
            const darkColor = document.getElementById('dark-color').value.replace('#', '');
            const lightColor = document.getElementById('light-color').value.replace('#', '');
            const frameType = document.getElementById('frame-type').value;

            const apis = [
                `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&color=${darkColor}&bgcolor=${lightColor}&format=png&ecc=M`,
                `https://chart.googleapis.com/chart?chs=${size}x${size}&cht=qr&chl=${encodeURIComponent(text)}&choe=UTF-8&chco=${darkColor}&chf=bg,s,${lightColor}`,
                `https://quickchart.io/qr?text=${encodeURIComponent(text)}&size=${size}&color=${darkColor}&bgcolor=${lightColor}&format=png`
            ];

            tryAPI(apis, 0, text, size, frameType);
        }

        function tryAPI(apis, index, text, size, frameType) {
            if (index >= apis.length) {
                document.getElementById('qr-container').innerHTML = `
                    <div class="qr-placeholder error-message">
                        ❌ هەڵەیەک ڕوویدا!<br>
                        <span style="font-size: 0.875rem;">تکایە ئینتەرنێتەکەت پشکنین بکە</span>
                    </div>
                `;
                resetButton();
                document.getElementById('download-section').classList.add('hidden');
                return;
            }

            const qrUrl = apis[index];
            const img = document.createElement('img');

            img.onload = function() {
                currentQRUrl = qrUrl;

                img.style.maxWidth = '100%';
                img.style.height = 'auto';
                img.style.display = 'block';
                img.alt = 'QR Code: ' + text;

                const frameContainer = document.createElement('div');
                frameContainer.className = `qr-image-wrapper frame-${frameType}`;

                frameContainer.appendChild(img);

                document.getElementById('qr-container').innerHTML = '';
                document.getElementById('qr-container').appendChild(frameContainer);
                document.getElementById('download-section').classList.remove('hidden');

                showToast('QR کۆد سازکرا!', 'success');
                resetButton();
            };

            img.onerror = function() {
                tryAPI(apis, index + 1, text, size, frameType);
            };

            setTimeout(() => {
                if (img.complete === false) {
                    img.onerror();
                }
            }, 8000);

            img.src = qrUrl;
        }

        function resetButton() {
            const generateBtn = document.getElementById('generate-btn');
            generateBtn.disabled = false;
            generateBtn.textContent = '⚡ QR کۆد دروست بکە';
        }

        function downloadQR(format) {
            if (!currentQRUrl) return;

            const link = document.createElement('a');
            link.href = currentQRUrl;
            link.download = `qr-code.${format === 'png' ? 'png' : 'svg'}`;
            link.click();

            showToast(`${format.toUpperCase()} داگیراکرا!`, 'success');
        }

        function copyToClipboard() {
            if (!currentQRUrl) return;

            fetch(currentQRUrl)
                .then(response => response.blob())
                .then(blob => {
                    navigator.clipboard.write([
                        new ClipboardItem({
                            [blob.type]: blob,
                        }),
                    ]).then(() => {
                        showToast('QR کۆد کۆپی کرا!', 'success');
                    }).catch(() => {
                        showToast('ناتوانرا کۆپی بکرێت', 'error');
                    });
                })
                .catch(() => {
                    showToast('هەڵەیەک ڕوویدا', 'error');
                });
        }

        function resetForm() {
            document.getElementById('qr-text').value = '';
            document.getElementById('size-slider').value = 220;
            document.getElementById('size-display').textContent = '220px';
            document.getElementById('dark-color').value = '#000000';
            document.getElementById('dark-color-text').textContent = '#000000';
            document.getElementById('light-color').value = '#ffffff';
            document.getElementById('light-color-text').textContent = '#ffffff';
            document.getElementById('frame-type').value = 'modern';
            document.getElementById('qr-container').innerHTML = `
                <div class="qr-placeholder">
                    QR کۆدەکەت لێرە دەردەکەوێت
                </div>
            `;
            document.getElementById('download-section').classList.add('hidden');
            currentQRUrl = '';
            showToast('فۆرمەکە ڕێست کرا', 'success');
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
