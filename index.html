<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#080612" />
  <meta name="description" content="QR Studio - پرۆفیشناڵترین دروستکەری QR کۆد" />
  <link rel="manifest" id="pwa-manifest" />
  <title>QR Studio Pro</title>
  
  <!-- External Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
  
  <style>
    /* ============ CSS Variables ============ */
    :root {
      --bg: #05040f;
      --bg2: #0d0b1e;
      --surface: rgba(255, 255, 255, 0.055);
      --surface2: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.09);
      --border2: rgba(255, 255, 255, 0.05);
      --primary: #7c3aed;
      --primary2: #6d28d9;
      --accent: #06b6d4;
      --accent2: #0891b2;
      --pink: #ec4899;
      --gold: #f59e0b;
      --green: #10b981;
      --text: #e8e3ff;
      --text2: #c4b5fd;
      --muted: rgba(196, 181, 253, 0.45);
      --radius: 16px;
      --radius-sm: 10px;
    }

    /* ============ Global Styles ============ */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Noto Kufi Arabic', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ============ Background Effects ============ */
    .bg-fx {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
    }

    .bg-orb1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #7c3aed, transparent 70%);
      top: -200px;
      right: -100px;
      animation: orb1 20s ease-in-out infinite alternate;
    }

    .bg-orb2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #06b6d4, transparent 70%);
      bottom: -150px;
      left: -100px;
      animation: orb2 25s ease-in-out infinite alternate;
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(124, 58, 237, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124, 58, 237, 0.07) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    @keyframes orb1 {
      to {
        transform: translate(-80px, 80px) scale(1.15);
      }
    }

    @keyframes orb2 {
      to {
        transform: translate(60px, -60px) scale(1.1);
      }
    }

    /* ============ Glass Morphism ============ */
    .glass {
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
    }

    .glass2 {
      background: var(--surface2);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border2);
    }

    /* ============ Layout ============ */
    .wrap {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    @media (min-width: 640px) {
      .wrap {
        padding: 16px;
      }
    }

    /* ============ Header ============ */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 10px 16px;
      border-radius: var(--radius);
      flex-shrink: 0;
    }

    .logo-text {
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #c084fc, #7c3aed, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-badge {
      background: linear-gradient(135deg, var(--pink), var(--primary));
      color: #fff;
      font-size: 0.5rem;
      font-weight: 800;
      padding: 1px 5px;
      border-radius: 20px;
      vertical-align: super;
    }

    /* ============ Stats Bar ============ */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      .stats-bar {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .stat-card {
      border-radius: var(--radius-sm);
      padding: 6px 4px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      opacity: 0.12;
    }

    .stat-num {
      font-size: 1.1rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .stat-lbl {
      font-size: 0.55rem;
      font-weight: 700;
      color: var(--muted);
      margin-top: 2px;
      text-transform: uppercase;
    }

    /* ============ Main Grid ============ */
    .main-grid {
      display: grid;
      gap: 12px;
      flex: 1;
      min-height: 0;
    }

    @media (min-width: 850px) {
      .main-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* ============ Scrollable Sections ============ */
    .scroll-sec {
      height: 100%;
      overflow-y: auto;
      padding: 16px;
      border-radius: var(--radius);
      scrollbar-width: thin;
      scrollbar-color: var(--primary) transparent;
    }

    .scroll-sec::-webkit-scrollbar {
      width: 4px;
    }

    .scroll-sec::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }

    /* ============ Tabs ============ */
    .tabs {
      display: flex;
      overflow-x: auto;
      gap: 4px;
      margin-bottom: 12px;
      padding: 4px;
      border-radius: var(--radius-sm);
      background: rgba(0, 0, 0, 0.2);
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      padding: 6px 10px;
      border-radius: 7px;
      font-size: 0.7rem;
      font-weight: 800;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .tab.on {
      background: linear-gradient(135deg, var(--primary), #4f46e5);
      color: #fff;
      box-shadow: 0 0 12px rgba(124, 58, 237, 0.4);
    }

    /* ============ Form Elements ============ */
    .lbl {
      display: block;
      font-size: 0.65rem;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .inp {
      background: rgba(255, 255, 255, 0.06);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 0.8rem;
      width: 100%;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .inp:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.09);
    }

    textarea.inp {
      min-height: 60px;
      resize: vertical;
    }

    select.inp {
      cursor: pointer;
    }

    /* ============ Buttons ============ */
    .btn {
      font-family: inherit;
      font-weight: 800;
      border: none;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.2s ease;
      font-size: 0.75rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 12px;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .btn-p {
      background: linear-gradient(135deg, var(--primary), #4f46e5);
      color: #fff;
      padding: 10px 14px;
      box-shadow: 0 0 16px rgba(124, 58, 237, 0.3);
    }

    .btn-p:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-g {
      background: linear-gradient(135deg, #059669, #10b981);
      color: #fff;
    }

    .btn-c {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
    }

    .btn-o {
      background: linear-gradient(135deg, #d97706, var(--gold));
      color: #fff;
    }

    .btn-sm {
      padding: 5px 8px;
      font-size: 0.65rem;
      border-radius: 6px;
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.07);
      color: var(--text2);
    }

    /* ============ QR Preview ============ */
    .qr-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 12px;
    }

    .qr-stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg2);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      position: relative;
      min-height: 200px;
      overflow: hidden;
    }

    .qr-img-wrap {
      max-width: 90%;
      max-height: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .qr-img-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }

    .qr-ph {
      text-align: center;
      opacity: 0.5;
    }

    .qr-ph-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .spin {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(124, 58, 237, 0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ============ Design Controls ============ */
    .design-card {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 12px;
    }

    .design-card h3 {
      font-size: 0.75rem;
      font-weight: 900;
      margin-bottom: 10px;
      color: var(--primary);
    }

    /* ============ History Item ============ */
    .hist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .hist-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .hist-item button {
      padding: 0;
      background: none;
      border: none;
      color: var(--pink);
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    .hist-item button:hover {
      transform: scale(1.2);
    }

    /* ============ Toast Notification ============ */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(15, 10, 30, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid var(--primary);
      color: #fff;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
      z-index: 9999;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      opacity: 0;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ============ Modals ============ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .modal-card {
      width: 100%;
      max-width: 450px;
      border-radius: 24px;
      overflow: hidden;
      background: var(--bg2);
      border: 1px solid var(--border);
    }

    /* ============ Vue Utilities ============ */
    [v-cloak] {
      display: none;
    }

    /* ============ Responsive Design ============ */
    @media (max-width: 480px) {
      .wrap {
        padding: 4px;
      }

      .header {
        padding: 8px 12px;
        margin-bottom: 8px;
      }

      .main-grid {
        gap: 8px;
      }

      .scroll-sec {
        padding: 12px;
      }
    }
  </style>
</head>

<body>
  <!-- Background Effects -->
  <div class="bg-fx">
    <div class="bg-orb bg-orb1"></div>
    <div class="bg-orb bg-orb2"></div>
    <div class="bg-grid"></div>
  </div>

  <!-- Main Application -->
  <div id="app" class="wrap" v-cloak>
    
    <!-- Header -->
    <header class="header glass">
      <div>
        <span class="logo-text">QR Studio</span>
        <span class="logo-badge">PRO</span>
      </div>
      <div style="display: flex; gap: 6px">
        <button class="btn btn-ghost btn-sm" @click="toggleTheme" title="تێما بگۆڕە">
          {{ lightTheme ? '🌙' : '☀️' }}
        </button>
      </div>
    </header>

    <!-- Main Content Grid -->
    <main class="main-grid">
      
      <!-- Left Section: Editor -->
      <section class="glass scroll-sec">
        
        <!-- Tabs Navigation -->
        <div class="tabs">
          <button 
            v-for="t in ['text', 'url', 'wifi', 'vcard', 'maps', 'email', 'sms', 'phone']" 
            :key="t" 
            :class="['tab', { on: tab === t }]" 
            @click="tab = t"
            :title="t">
            {{ {
              text: 'تێکست',
              url: 'بەستەر',
              wifi: 'WiFi',
              vcard: 'کارت',
              maps: 'نەخشە',
              email: 'ئیمەیل',
              sms: 'SMS',
              phone: 'تەلەفۆن'
            }[t] }}
          </button>
          <button 
            :class="['tab', { on: tab === 'scan' }]" 
            @click="startScan" 
            style="color: var(--accent)"
            title="QR سکان بکە">
            🔍 سکان
          </button>
          <button 
            :class="['tab', { on: tab === 'history' }]" 
            @click="tab = 'history'"
            title="مێژووی دروستکردن">
            📜 مێژوو
          </button>
        </div>

        <!-- Tab Content -->
        <div style="margin-bottom: 15px">
          <h2 style="font-size: 0.9rem; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 6px">
            <span style="width: 4px; height: 16px; background: var(--primary); border-radius: 2px"></span>
            {{ currentTabLabel }}
          </h2>

          <!-- Input Forms -->
          <div v-if="tab === 'text'">
            <label class="lbl">📝 ناوەرۆک</label>
            <textarea class="inp" v-model="inputs.text" placeholder="چی بنووسم بۆت؟..."></textarea>
          </div>

          <div v-if="tab === 'url'">
            <label class="lbl">🔗 لینکی ماڵپەڕ</label>
            <input class="inp" v-model="inputs.url" type="url" placeholder="https://example.com" />
          </div>

          <div v-if="tab === 'wifi'" style="display: grid; gap: 8px">
            <input class="inp" v-model="inputs.ssid" placeholder="ناوی تۆڕ (SSID)" />
            <input 
              class="inp" 
              :type="showPass ? 'text' : 'password'" 
              v-model="inputs.wpass" 
              placeholder="وشەی نهێنی" />
            <select class="inp" v-model="inputs.wsec">
              <option value="WPA">WPA/WPA2</option>
              <option value="WEP">WEP</option>
              <option value="nopass">بێ نهێنی</option>
            </select>
          </div>

          <div v-if="tab === 'vcard'" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px">
            <div style="grid-column: span 2">
              <input class="inp" v-model="inputs.vcName" placeholder="ناوی تەواو" />
            </div>
            <input class="inp" v-model="inputs.vcPhone" placeholder="مۆبایل" />
            <input class="inp" v-model="inputs.vcEmail" placeholder="ئیمەیل" />
          </div>

          <div v-if="tab === 'maps'" style="display: flex; flex-direction: column; gap: 8px">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px">
              <input class="inp" v-model="inputs.lat" placeholder="Latitude" />
              <input class="inp" v-model="inputs.lng" placeholder="Longitude" />
            </div>
            <button class="btn btn-ghost btn-sm" @click="getLocation">📍 شوێنی ئێستام</button>
          </div>

          <div v-if="tab === 'email'" style="display: grid; gap: 8px">
            <input class="inp" v-model="inputs.eTo" placeholder="بۆ" />
            <input class="inp" v-model="inputs.eSubj" placeholder="بابەت" />
            <textarea class="inp" v-model="inputs.eBody" placeholder="پەیام"></textarea>
          </div>

          <div v-if="tab === 'sms'" style="display: grid; gap: 8px">
            <input class="inp" v-model="inputs.smsTo" placeholder="ژمارە" />
            <textarea class="inp" v-model="inputs.smsBody" placeholder="پەیام"></textarea>
          </div>

          <div v-if="tab === 'phone'">
            <input class="inp" v-model="inputs.phone" placeholder="ژمارەی تەلەفۆن" />
          </div>

          <!-- History Section -->
          <div v-if="tab === 'history'">
            <div v-if="history.length === 0" style="text-align: center; padding: 20px; opacity: 0.4; font-size: 0.7rem">
              📂 مێژوو بەتاڵە
            </div>
            <div v-else style="display: grid; gap: 6px">
              <div 
                v-for="(h, i) in history.slice(0, 10)" 
                :key="i" 
                class="hist-item" 
                @click="loadHistory(h)" 
                style="padding: 6px 10px">
                <div style="flex: 1; overflow: hidden; font-size: 0.7rem">
                  <b>{{ h.type }}</b>: {{ h.label }}
                </div>
                <button @click.stop="removeHistory(i)" title="سڕینەوە">🗑️</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div style="display: grid; grid-template-columns: 1fr auto; gap: 8px">
          <button class="btn btn-p" @click="generateQR" :disabled="loading">
            ✨ دروستکردن
          </button>
          <button class="btn btn-ghost" @click="resetDesign" title="ڕیسێت">🔄</button>
        </div>

        <!-- Design Controls -->
        <div class="design-card" style="margin-top: 20px">
          <h3>🎨 دیزاین و ڕەنگ</h3>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px">
            <div>
              <label class="lbl">🖼️ چوارچێوە</label>
              <select class="inp" v-model="frameType">
                <option value="none">بێ چوارچێوە</option>
                <option value="modern">مۆدێرن</option>
                <option value="elegant">ناسک</option>
                <option value="neon">نیۆن</option>
                <option value="gold">ئاڵتونی</option>
              </select>
            </div>
            <div>
              <label class="lbl">📏 قەبارە</label>
              <input type="range" v-model="size" min="150" max="500" step="10" />
            </div>
            <div>
              <label class="lbl">🎨 ڕەنگ</label>
              <div style="display: flex; gap: 5px">
                <input type="color" v-model="darkColor" title="ڕەنگی تاریک" />
                <input type="color" v-model="lightColor" title="ڕەنگی ڕووناک" />
              </div>
            </div>
            <div>
              <label class="lbl">🛡️ ECC</label>
              <select class="inp" v-model="ecc">
                <option value="L">نزم</option>
                <option value="M">مامناوەند</option>
                <option value="H">بەرز</option>
              </select>
            </div>
          </div>
        </div>
      </section>

      <!-- Right Section: QR Preview -->
      <section class="qr-container">
        <div class="qr-stage glass">
          <!-- Placeholder -->
          <div v-if="!qrUrl && !loading" class="qr-ph">
            <div class="qr-ph-icon">✨</div>
            <div style="font-weight: 800; font-size: 0.75rem">ئامادەیە بۆ دروستکردن</div>
          </div>

          <!-- Loading Spinner -->
          <div v-if="loading" class="spin"></div>

          <!-- QR Code Display -->
          <div v-if="qrUrl && !loading" class="qr-img-wrap">
            <img :src="qrUrl" alt="QR Code" />
            <div style="display: flex; gap: 5px; flex-wrap: wrap; justify-content: center">
              <button class="btn btn-g btn-sm" @click="downloadPNG" title="PNG دابەزاندن">📥 PNG</button>
              <button class="btn btn-c btn-sm" @click="copyLink" title="لینک کۆپی بکە">📋 کۆپی</button>
              <button class="btn btn-ghost btn-sm" @click="shareNative" title="ناردن">📤 ناردن</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <!-- Vue Application Script -->
  <script>
    const { createApp, ref, reactive, computed, onMounted, onUnmounted, watch, nextTick } = Vue;

    createApp({
      setup() {
        // ============ State Variables ============
        const tab = ref('text');
        const lightTheme = ref(false);
        const loading = ref(false);
        const qrUrl = ref('');
        const showShortcuts = ref(false);
        const showPass = ref(false);
        const size = ref(220);
        const frameType = ref('modern');
        const darkColor = ref('#000000');
        const lightColor = ref('#ffffff');
        const ecc = ref('M');
        const history = ref([]);
        const selTemplate = ref('');
        const selScheme = ref('classic');
        let debTimer = null;

        // ============ Input Fields ============
        const inputs = reactive({
          text: '',
          url: '',
          ssid: '',
          wpass: '',
          wsec: 'WPA',
          vcName: '',
          vcOrg: '',
          vcPhone: '',
          vcEmail: '',
          vcWeb: '',
          vcAddr: '',
          vcBday: '',
          lat: '',
          lng: '',
          mapName: '',
          eTo: '',
          eSubj: '',
          eBody: '',
          smsTo: '',
          smsBody: '',
          phone: ''
        });

        // ============ Computed Properties ============
        const stats = computed(() => {
          const today = new Date().toLocaleDateString('ku');
          return {
            total: history.value.length,
            today: history.value.filter(h => h.date === today).length,
            types: [...new Set(history.value.map(h => h.type))].length
          };
        });

        const currentTabLabel = computed(() => {
          const labels = {
            text: 'تێکست',
            url: 'بەستەر',
            wifi: 'WiFi',
            vcard: 'کارت',
            maps: 'نەخشە',
            email: 'ئیمەیل',
            sms: 'SMS',
            phone: 'تەلەفۆن',
            history: 'مێژوو'
          };
          return labels[tab.value] || tab.value;
        });

        // ============ Templates ============
        const templates = [
          {
            id: 'biz',
            icon: '🏢',
            name: 'بیزنس',
            tab: 'url',
            data: { url: 'https://yourwebsite.com' }
          },
          {
            id: 'wifi_home',
            icon: '📶',
            name: 'WiFi',
            tab: 'wifi',
            data: { ssid: 'HomeWiFi', wsec: 'WPA' }
          },
          {
            id: 'contact',
            icon: '👤',
            name: 'پەیوەندی',
            tab: 'vcard',
            data: { vcName: 'ناوت' }
          },
          {
            id: 'location',
            icon: '📍',
            name: 'شوێن',
            tab: 'maps',
            data: { lat: '36.1901', lng: '44.0091' }
          }
        ];

        // ============ Methods ============
        function toggleTheme() {
          lightTheme.value = !lightTheme.value;
          document.body.classList.toggle('light', lightTheme.value);
        }

        function buildData() {
          switch (tab.value) {
            case 'text':
              return inputs.text.trim();
            case 'url':
              return inputs.url.trim();
            case 'wifi':
              return `WIFI:T:${inputs.wsec};S:${inputs.ssid};P:${inputs.wpass};;`;
            case 'vcard':
              return `BEGIN:VCARD\nVERSION:3.0\nFN:${inputs.vcName}\nTEL:${inputs.vcPhone}\nEMAIL:${inputs.vcEmail}\nEND:VCARD`;
            case 'maps':
              return inputs.lat && inputs.lng
                ? `https://maps.google.com/?q=${inputs.lat},${inputs.lng}`
                : '';
            case 'email':
              return inputs.eTo
                ? `mailto:${inputs.eTo}?subject=${encodeURIComponent(inputs.eSubj)}&body=${encodeURIComponent(inputs.eBody)}`
                : '';
            case 'sms':
              return inputs.smsTo
                ? `sms:${inputs.smsTo}?body=${encodeURIComponent(inputs.smsBody)}`
                : '';
            case 'phone':
              return inputs.phone ? `tel:${inputs.phone}` : '';
            default:
              return '';
          }
        }

        function generateQR() {
          const data = buildData();
          if (!data) {
            showToast('⚠️ زانیاری بنووسە!');
            return;
          }

          loading.value = true;
          qrUrl.value = '';

          const s = Math.min(size.value, 350);
          const dc = darkColor.value.replace('#', '');
          const lc = lightColor.value.replace('#', '');
          const url = `https://api.qrserver.com/v1/create-qr-code/?size=${s}x${s}&data=${encodeURIComponent(data)}&color=${dc}&bgcolor=${lc}&format=png&ecc=${ecc.value}`;

          const img = new Image();
          img.onload = () => {
            qrUrl.value = url;
            loading.value = false;
            saveHist(data, url);
          };
          img.onerror = () => {
            loading.value = false;
            showToast('❌ هەڵەیەک ڕوویدا');
          };
          img.src = url;
        }

        function resetDesign() {
          size.value = 220;
          frameType.value = 'modern';
          darkColor.value = '#000000';
          lightColor.value = '#ffffff';
          showToast('✅ ڕیسێت کرا');
        }

        function applyTemplate(t) {
          selTemplate.value = t.id;
          tab.value = t.tab;
          Object.assign(inputs, t.data);
          showToast(`✅ تێمپلێت: ${t.name}`);
        }

        function copyLink() {
          if (qrUrl.value) {
            navigator.clipboard.writeText(qrUrl.value);
            showToast('📋 کۆپی کرا');
          }
        }

        async function shareNative() {
          if (qrUrl.value && navigator.share) {
            try {
              await navigator.share({
                title: 'QR',
                url: qrUrl.value
              });
            } catch (err) {
              // User cancelled share
            }
          } else {
            copyLink();
          }
        }

        function downloadPNG() {
          if (qrUrl.value) {
            const a = document.createElement('a');
            a.href = qrUrl.value;
            a.download = 'qr-code.png';
            a.click();
            showToast('📥 دابەزاندن دەست پێکرد');
          }
        }

        function saveHist(data, url) {
          history.value.unshift({
            type: tab.value,
            label: data.slice(0, 30),
            url,
            date: new Date().toLocaleDateString('ku')
          });
          if (history.value.length > 20) {
            history.value.pop();
          }
          localStorage.setItem('qr_h_fit', JSON.stringify(history.value));
        }

        function loadHistory(h) {
          qrUrl.value = h.url;
          showToast('✅ بارکرا');
        }

        function removeHistory(i) {
          history.value.splice(i, 1);
          localStorage.setItem('qr_h_fit', JSON.stringify(history.value));
        }

        function getLocation() {
          if (!navigator.geolocation) {
            showToast('❌ GPS بەردەست نییە');
            return;
          }
          navigator.geolocation.getCurrentPosition(
            p => {
              inputs.lat = p.coords.latitude.toFixed(6);
              inputs.lng = p.coords.longitude.toFixed(6);
              showToast('✅ شوێن دۆزرایەوە');
            },
            () => showToast('❌ هەڵە لە دۆزینەوەی شوێن')
          );
        }

        function showToast(msg) {
          const el = document.getElementById('toast');
          if (!el) return;
          el.textContent = msg;
          el.classList.add('show');
          setTimeout(() => el.classList.remove('show'), 2500);
        }

        function startScan() {
          showToast('🔍 سکان فیچەری بەرز دێت');
        }

        // ============ Lifecycle Hooks ============
        onMounted(() => {
          const s = localStorage.getItem('qr_h_fit');
          if (s) {
            try {
              history.value = JSON.parse(s);
            } catch (err) {
              console.error('Error loading history:', err);
            }
          }
        });

        // ============ Return Public API ============
        return {
          tab,
          lightTheme,
          toggleTheme,
          loading,
          qrUrl,
          inputs,
          size,
          frameType,
          darkColor,
          lightColor,
          ecc,
          history,
          loadHistory,
          removeHistory,
          templates,
          selTemplate,
          showShortcuts,
          showPass,
          stats,
          currentTabLabel,
          generateQR,
          resetDesign,
          applyTemplate,
          copyLink,
          shareNative,
          downloadPNG,
          getLocation,
          startScan
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
