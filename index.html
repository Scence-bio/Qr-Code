<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دروستکردنی QR کۆد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Kufi Arabic', 'NotoKufiArabic', sans-serif;
        }
        
        body {
            direction: rtl;
        }

        @keyframes gradientShift {
            0%, 100% { background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); }
            50% { background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%); }
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .bg-gradient-animated {
            animation: gradientShift 10s ease infinite;
            background-size: 400% 400%;
        }

        .float-up {
            animation: floatUp 0.8s ease-out;
        }

        .border-glow {
            animation: borderGlow 3s ease-in-out infinite;
        }

        .spinner {
            border: 4px solid rgba(79, 172, 254, 0.1);
            border-top: 4px solid #4facfe;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        .frame-modern {
            padding: 15px;
            background: linear-gradient(145deg, #ffffff, #f8f9fa);
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1), inset 0 2px 8px rgba(255, 255, 255, 0.8);
        }

        .frame-elegant {
            padding: 20px;
            background: linear-gradient(145deg, #f8f9fa, #ffffff);
            border-radius: 12px;
            border: 3px solid #4facfe;
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.3);
        }

        .frame-classic {
            padding: 15px;
            background: #ffffff;
            border: 6px solid #333;
            border-radius: 4px;
            box-shadow: 0 0 0 3px #fff, 0 0 0 6px #333;
        }

        .frame-rounded {
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 40px;
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
        }

        .frame-shadow {
            padding: 12px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(0, 0, 0, 0.05);
        }

        .frame-tech {
            padding: 15px;
            background: linear-gradient(145deg, #2c3e50, #34495e);
            border-radius: 12px;
            border: 2px solid #4facfe;
            position: relative;
            overflow: hidden;
        }

        .frame-neon {
            padding: 18px;
            background: #000;
            border-radius: 12px;
            border: 2px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .frame-gradient {
            padding: 15px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%);
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(240, 147, 251, 0.3);
        }

        .frame-gold {
            padding: 15px;
            background: linear-gradient(145deg, #ffd700, #ffed4e);
            border-radius: 12px;
            border: 3px solid #daa520;
            box-shadow: 0 8px 25px rgba(218, 165, 32, 0.3);
        }

        .qr-with-frame img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 320px;
            color: #999;
            font-weight: 600;
            text-align: center;
        }

        .placeholder.error {
            color: #ef4444;
        }

        .placeholder.success {
            color: #3b82f6;
        }
    </style>
</head>
<body class="bg-gradient-animated min-h-screen py-8 px-4">
    <div class="max-w-2xl mx-auto float-up">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 bg-clip-text text-transparent mb-2">
                🎯 دروستکردنی QR کۆد
            </h1>
            <p class="text-lg text-gray-600">ئێستا بەئاسانی QR کۆد دروست بکە!</p>
        </div>

        <!-- Main Container -->
        <div class="bg-white bg-opacity-95 rounded-2xl shadow-2xl backdrop-blur-lg border border-white border-opacity-20 overflow-hidden">
            <!-- Header Section -->
            <div class="bg-gradient-to-r from-blue-400 to-cyan-400 p-6 text-center text-white relative overflow-hidden">
                <div class="absolute inset-0 opacity-10 border-glow"></div>
                <h2 class="text-2xl font-bold relative z-10">🚀 دروستکردنی QR کۆد</h2>
            </div>

            <!-- Content -->
            <div class="p-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <!-- Input Section -->
                    <div class="space-y-6">
                        <!-- Text Input -->
                        <div class="space-y-2">
                            <label class="block text-base font-bold text-gray-800">📝 تێکستەکەت یان بەستەرەکەت بنووسە</label>
                            <textarea
                                id="qr-text"
                                placeholder="تێکستەکەت یان https://example.com بنووسە..."
                                class="w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-200 transition min-h-24 resize-none font-medium"
                            ></textarea>
                        </div>

                        <!-- Size Slider -->
                        <div class="space-y-3">
                            <div class="flex justify-between items-center">
                                <label class="text-base font-bold text-gray-800">📏 قەبارەی QR کۆد</label>
                                <span id="size-display" class="text-sm font-bold text-white bg-blue-600 px-3 py-1 rounded-full">220px</span>
                            </div>
                            <input
                                type="range"
                                id="size-slider"
                                min="150"
                                max="350"
                                value="220"
                                class="w-full h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-blue-600"
                            >
                        </div>

                        <!-- Frame Type -->
                        <div class="space-y-2">
                            <label class="block text-base font-bold text-gray-800">🎨 جۆری چوارچێوە</label>
                            <select
                                id="frame-type"
                                class="w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-200 transition font-medium"
                            >
                                <option value="none">بەبێ چوارچێوە</option>
                                <option value="modern" selected>مۆدێرن</option>
                                <option value="elegant">جوان</option>
                                <option value="classic">کلاسیک</option>
                                <option value="rounded">خولاوی</option>
                                <option value="shadow">سێبەر</option>
                                <option value="tech">تەکنەلۆجی</option>
                                <option value="neon">نیۆن</option>
                                <option value="gradient">ڕەنگاوڕەنگ</option>
                                <option value="gold">زێڕین</option>
                            </select>
                        </div>

                        <!-- Colors -->
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="block text-base font-bold text-gray-800">ڕەنگی QR</label>
                                <div class="flex items-center gap-3">
                                    <input
                                        type="color"
                                        id="dark-color"
                                        value="#000000"
                                        class="w-16 h-16 rounded-lg cursor-pointer border-2 border-gray-300"
                                    >
                                    <span id="dark-color-text" class="text-sm font-mono text-gray-600">#000000</span>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="block text-base font-bold text-gray-800">ڕەنگی باگڕاوند</label>
                                <div class="flex items-center gap-3">
                                    <input
                                        type="color"
                                        id="light-color"
                                        value="#ffffff"
                                        class="w-16 h-16 rounded-lg cursor-pointer border-2 border-gray-300"
                                    >
                                    <span id="light-color-text" class="text-sm font-mono text-gray-600">#ffffff</span>
                                </div>
                            </div>
                        </div>

                        <!-- Generate Button -->
                        <button
                            id="generate-btn"
                            onclick="generateQR()"
                            class="w-full py-4 px-6 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold text-lg rounded-lg transition-all duration-300 transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100"
                        >
                            ⚡ QR کۆد دروست بکە
                        </button>
                    </div>

                    <!-- Output Section -->
                    <div class="flex flex-col">
                        <!-- QR Display -->
                        <div id="qr-container" class="flex-1 flex items-center justify-center mb-6 bg-gradient-to-br from-gray-50 to-gray-100 rounded-lg border-2 border-dashed border-gray-300 min-h-80">
                            <div class="placeholder">
                                QR کۆدەکەت لێرە دەردەکەوێت
                            </div>
                        </div>

                        <!-- Download Buttons -->
                        <div id="download-section" class="grid grid-cols-2 gap-3 mb-6" style="display: none;">
                            <button
                                onclick="downloadQR('png')"
                                class="py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-all duration-300 flex items-center justify-center gap-2"
                            >
                                📥 PNG
                            </button>
                            <button
                                onclick="downloadQR('svg')"
                                class="py-3 px-4 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-lg transition-all duration-300 flex items-center justify-center gap-2"
                            >
                                📄 SVG
                            </button>
                        </div>

                        <!-- Footer -->
                        <div class="pt-4 border-t border-gray-200 text-center text-sm text-gray-600">
                            <p>
                                🔥 <strong>دروست کراوە لەلایەن</strong>
                                <a
                                    href="https://www.facebook.com/share/1ZoYU1DAhS/?mibextid=wwXIfr"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    class="text-blue-600 hover:text-blue-700 font-bold"
                                >
                                    MAHMOOD FAQE
                                </a>
                            </p>
                            <p class="mt-1">لە هەموو ئامێرەکان کار دەکات - باشترین و بەخۆڕایی!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentQRUrl = '';
        let currentQRData = '';

        // Update size display
        document.getElementById('size-slider').addEventListener('input', function() {
            document.getElementById('size-display').textContent = this.value + 'px';
            if (document.getElementById('qr-container').querySelector('.qr-with-frame')) {
                generateQR();
            }
        });

        // Update color display
        document.getElementById('dark-color').addEventListener('input', function() {
            document.getElementById('dark-color-text').textContent = this.value;
            if (document.getElementById('qr-container').querySelector('.qr-with-frame')) {
                generateQR();
            }
        });

        document.getElementById('light-color').addEventListener('input', function() {
            document.getElementById('light-color-text').textContent = this.value;
            if (document.getElementById('qr-container').querySelector('.qr-with-frame')) {
                generateQR();
            }
        });

        // Auto-regenerate on frame type change
        document.getElementById('frame-type').addEventListener('change', function() {
            if (document.getElementById('qr-container').querySelector('.qr-with-frame')) {
                generateQR();
            }
        });

        function generateQR() {
            const text = document.getElementById('qr-text').value.trim();

            if (!text) {
                document.getElementById('qr-container').innerHTML = `
                    <div class="placeholder error">
                        <strong>⚠️ تکایە تێکستەکەت بنووسە!</strong>
                    </div>
                `;
                document.getElementById('download-section').style.display = 'none';
                return;
            }

            currentQRData = text;

            // Get settings
            const size = Math.min(document.getElementById('size-slider').value, 300);
            const darkColor = document.getElementById('dark-color').value.replace('#', '');
            const lightColor = document.getElementById('light-color').value.replace('#', '');
            const frameType = document.getElementById('frame-type').value;

            // Show loading
            document.getElementById('qr-container').innerHTML = `
                <div class="placeholder success">
                    <div class="flex flex-col items-center gap-4">
                        <div class="spinner"></div>
                        <strong>چاوەڕێ بکە...</strong><br>
                        <span class="text-sm">QR کۆد دروست دەکرێت</span>
                    </div>
                </div>
            `;

            // Disable button
            const generateBtn = document.getElementById('generate-btn');
            generateBtn.disabled = true;
            generateBtn.textContent = '🔄 دروستکردن...';

            // Try multiple QR APIs
            const apis = [
                `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&color=${darkColor}&bgcolor=${lightColor}&format=png&ecc=M`,
                `https://chart.googleapis.com/chart?chs=${size}x${size}&cht=qr&chl=${encodeURIComponent(text)}&choe=UTF-8&chco=${darkColor}&chf=bg,s,${lightColor}`,
                `https://quickchart.io/qr?text=${encodeURIComponent(text)}&size=${size}&color=${darkColor}&bgcolor=${lightColor}&format=png`
            ];

            tryAPI(apis, 0, text, size, frameType);
        }

        function tryAPI(apis, index, text, size, frameType) {
            if (index >= apis.length) {
                document.getElementById('qr-container').innerHTML = `
                    <div class="placeholder error">
                        <strong>❌ هەڵەیەک ڕوویدا!</strong><br>
                        <span class="text-sm">تکایە ئینتەرنێتەکەت پشکنین بکە و دووبارە تاقی بکەرەوە</span>
                    </div>
                `;
                resetButton();
                document.getElementById('download-section').style.display = 'none';
                return;
            }

            const qrUrl = apis[index];
            const img = document.createElement('img');

            img.onload = function() {
                currentQRUrl = qrUrl;

                img.style.maxWidth = '100%';
                img.style.height = 'auto';
                img.style.display = 'block';
                img.alt = 'QR Code: ' + text;

                // Create frame container
                const frameContainer = document.createElement('div');
                frameContainer.className = 'qr-with-frame';

                if (frameType !== 'none') {
                    frameContainer.classList.add('frame-' + frameType);
                }

                frameContainer.appendChild(img);

                document.getElementById('qr-container').innerHTML = '';
                document.getElementById('qr-container').appendChild(frameContainer);
                document.getElementById('download-section').style.display = 'grid';

                // Add animation
                frameContainer.style.opacity = '0';
                frameContainer.style.transform = 'scale(0.8)';
                setTimeout(() => {
                    frameContainer.style.transition = 'all 0.5s ease';
                    frameContainer.style.opacity = '1';
                    frameContainer.style.transform = 'scale(1)';
                }, 100);

                resetButton();
            };

            img.onerror = function() {
                tryAPI(apis, index + 1, text, size, frameType);
            };

            setTimeout(() => {
                if (img.complete === false) {
                    img.onerror();
                }
            }, 8000);

            img.src = qrUrl;
        }

        function resetButton() {
            const generateBtn = document.getElementById('generate-btn');
            generateBtn.disabled = false;
            generateBtn.textContent = '⚡ QR کۆد دروست بکە';
        }

        function downloadQR(format) {
            if (!currentQRUrl) return;

            const link = document.createElement('a');
            link.href = currentQRUrl;
            link.download = `qr-code.${format === 'png' ? 'png' : 'svg'}`;
            link.click();
        }
    </script>
</body>
</html>
