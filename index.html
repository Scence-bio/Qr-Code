<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دروستکەری QR کۆد - کاری گەرەنتیکراو</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
            animation: gradientShift 10s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); }
            50% { background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%); }
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            animation: floatUp 0.8s ease-out;
        }
        
        @keyframes floatUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 40px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .header h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            font-weight: 800;
            position: relative;
            z-index: 2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .header p {
            font-size: 1.3rem;
            opacity: 0.95;
            position: relative;
            z-index: 2;
        }
        
        .content {
            padding: 50px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }
        
        .input-section {
            background: linear-gradient(145deg, #f8faff 0%, #ffffff 100%);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(79, 172, 254, 0.1);
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input, textarea {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #e8ecf4;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
            font-family: inherit;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.15);
            transform: translateY(-2px);
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .design-controls {
            background: linear-gradient(145deg, #f1f8ff 0%, #e8f4ff 100%);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(79, 172, 254, 0.1);
        }
        
        .size-control {
            margin-bottom: 20px;
        }
        
        .size-slider {
            width: 100%;
            margin: 10px 0;
        }
        
        .color-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .color-group {
            text-align: center;
        }
        
        .color-input {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .color-input:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .generate-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }
        
        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .output-section {
            background: linear-gradient(145deg, #ffffff 0%, #f8faff 100%);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid rgba(79, 172, 254, 0.1);
        }
        
        .qr-container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            min-height: 330px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .qr-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #4facfe, #00f2fe, #4facfe);
            border-radius: 22px;
            z-index: -1;
            animation: borderGlow 3s ease-in-out infinite;
        }
        
        @keyframes borderGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .placeholder {
            color: #999;
            font-size: 1.2rem;
            padding: 40px 20px;
        }
        
        .error {
            color: #e74c3c;
        }
        
        .success {
            color: #4facfe;
        }
        
        .download-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 0 10px;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.4);
        }
        
        .api-info {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
                padding: 30px;
                gap: 30px;
            }
            
            .header h1 {
                font-size: 2.2rem;
            }
            
            .color-controls {
                grid-template-columns: 1fr;
            }
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4facfe;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 دروستکەری QR کۆد</h1>
            <p>QR کۆدی ڕاستەقینە دروست بکە - گەرەنتیکراو!</p>
        </div>
        
        <div class="content">
            <div class="input-section">
                <div class="form-group">
                    <label>📝 تێکستەکەت یان بەستەرەکەت بنووسە</label>
                    <textarea id="qr-text" placeholder="تێکستەکەت یان https://example.com بنووسە...">سڵاو! ئەمە تاقیکردنەوەی QR کۆدە.</textarea>
                </div>
                
                <div class="design-controls">
                    <div class="size-control">
                        <label>📏 قەبارەی QR کۆد</label>
                        <input type="range" id="size-slider" class="size-slider" min="150" max="400" value="280">
                        <div style="text-align: center; margin-top: 5px; font-weight: bold;" id="size-display">280px</div>
                    </div>
                    
                    <div class="color-controls">
                        <div class="color-group">
                            <label>ڕەنگی QR</label>
                            <input type="color" id="dark-color" class="color-input" value="#000000">
                        </div>
                        <div class="color-group">
                            <label>ڕەنگی پاش</label>
                            <input type="color" id="light-color" class="color-input" value="#ffffff">
                        </div>
                    </div>
                </div>
                
                <button class="generate-btn" id="generate-btn" onclick="generateQR()">
                    ⚡ QR کۆد دروست بکە
                </button>
            </div>
            
            <div class="output-section">
                <div class="qr-container">
                    <div id="qr-display" class="placeholder">
                        QR کۆدەکەت لێرە دەردەکەوێت
                    </div>
                </div>
                
                <div id="download-section" style="display: none;">
                    <button class="download-btn" onclick="downloadQR()">
                        📥 QR کۆد داگرە
                    </button>
                </div>
                
                <div class="api-info">
                    <strong>🔥 ئەم QR کۆدە بە QR Server API دروست کراوە</strong><br>
                    لە هەموو ئامێرەکانی سکانەر کار دەکات - باشترین جۆرایەتی!
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentQRUrl = '';
        
        // Update size display
        document.getElementById('size-slider').addEventListener('input', function() {
            document.getElementById('size-display').textContent = this.value + 'px';
            if (document.getElementById('qr-display').querySelector('img')) {
                generateQR();
            }
        });
        
        // Auto-regenerate on color change
        document.getElementById('dark-color').addEventListener('change', function() {
            if (document.getElementById('qr-display').querySelector('img')) {
                generateQR();
            }
        });
        
        document.getElementById('light-color').addEventListener('change', function() {
            if (document.getElementById('qr-display').querySelector('img')) {
                generateQR();
            }
        });
        
        function generateQR() {
            const text = document.getElementById('qr-text').value.trim();
            
            if (!text) {
                document.getElementById('qr-display').innerHTML = `
                    <div class="placeholder error">
                        <strong>⚠️ تکایە تێکستەکەت بنووسە!</strong>
                    </div>
                `;
                return;
            }
            
            // Get settings
            const size = document.getElementById('size-slider').value;
            const darkColor = document.getElementById('dark-color').value.replace('#', '');
            const lightColor = document.getElementById('light-color').value.replace('#', '');
            
            // Show loading
            document.getElementById('qr-display').innerHTML = `
                <div class="placeholder success">
                    <div class="spinner"></div>
                    <strong>چاوەڕێ بکە...</strong><br>
                    QR کۆد دروست دەکرێت
                </div>
            `;
            
            // Disable button during generation
            const generateBtn = document.getElementById('generate-btn');
            generateBtn.disabled = true;
            generateBtn.textContent = '🔄 دروستکردن...';
            
            // Try multiple QR APIs for better reliability
            const apis = [
                // QR Server API (free and reliable)
                `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&color=${darkColor}&bgcolor=${lightColor}&format=png&ecc=M`,
                
                // Backup: Google Charts API
                `https://chart.googleapis.com/chart?chs=${size}x${size}&cht=qr&chl=${encodeURIComponent(text)}&choe=UTF-8&chco=${darkColor}&chf=bg,s,${lightColor}`,
                
                // Backup: QuickChart API
                `https://quickchart.io/qr?text=${encodeURIComponent(text)}&size=${size}&color=${darkColor}&bgcolor=${lightColor}`
            ];
            
            tryAPI(apis, 0, text, size);
        }
        
        function tryAPI(apis, index, text, size) {
            if (index >= apis.length) {
                // All APIs failed
                document.getElementById('qr-display').innerHTML = `
                    <div class="placeholder error">
                        <strong>❌ هەڵەیەک ڕوویدا!</strong><br>
                        تکایە ئینتەرنێتەکەت پشکنین بکە و دووبارە تاقی بکەرەوە
                    </div>
                `;
                resetButton();
                return;
            }
            
            const qrUrl = apis[index];
            const img = document.createElement('img');
            
            img.onload = function() {
                currentQRUrl = qrUrl;
                
                // Success! Display the QR code
                img.style.width = size + 'px';
                img.style.height = size + 'px';
                img.style.borderRadius = '15px';
                img.style.boxShadow = '0 4px 15px rgba(0, 0, 0, 0.1)';
                img.alt = 'QR Code: ' + text;
                
                document.getElementById('qr-display').innerHTML = '';
                document.getElementById('qr-display').appendChild(img);
                document.getElementById('download-section').style.display = 'block';
                
                // Add success animation
                img.style.opacity = '0';
                img.style.transform = 'scale(0.8)';
                setTimeout(() => {
                    img.style.transition = 'all 0.5s ease';
                    img.style.opacity = '1';
                    img.style.transform = 'scale(1)';
                }, 100);
                
                resetButton();
            };
            
            img.onerror = function() {
                // This API failed, try the next one
                tryAPI(apis, index + 1, text, size);
            };
            
            // Set a timeout for slow-loading APIs
            setTimeout(() => {
                if (img.complete === false) {
                    img.onerror();
                }
            }, 10000); // 10 second timeout
            
            img.src = qrUrl;
        }
        
        function resetButton() {
            const generateBtn = document.getElementById('generate-btn');
            generateBtn.disabled = false;
            generateBtn.textContent = '⚡ QR کۆد دروست بکە';
        }
        
        function downloadQR() {
            if (!currentQRUrl) {
                alert('QR کۆد نەدۆزرایەوە!');
                return;
            }
            
            // Create a temporary link to download
            const link = document.createElement('a');
            link.href = currentQRUrl;
            link.download = `qr-code-${Date.now()}.png`;
            link.target = '_blank';
            
            // For some browsers, we need to add to DOM first
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        // Generate QR on Enter key
        document.getElementById('qr-text').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateQR();
            }
        });
        
        // Auto-generate on page load with demo content
        window.addEventListener('load', function() {
            setTimeout(generateQR, 1500);
        });
        
        // Real-time text change with debouncing
        let timeout;
        document.getElementById('qr-text').addEventListener('input', function() {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                if (this.value.trim() && document.getElementById('qr-display').querySelector('img')) {
                    generateQR();
                }
            }, 2000); // Wait 2 seconds after user stops typing
        });
    </script>
</body>
</html>
